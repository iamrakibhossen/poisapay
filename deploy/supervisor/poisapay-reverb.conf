; Reverb websocket server for PoisaPay (non-Docker deploy).
[program:poisapay-reverb]
process_name=%(program_name)s
command=php /var/www/poisapay/artisan reverb:start --host=0.0.0.0 --port=8080
directory=/var/www/poisapay
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/poisapay/storage/logs/reverb.log
stopsignal=TERM
